name: Release GUI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            os_name: linux
            arch: amd64
            extra_args: "-tags webkit2_41"

          - os: macos-latest
            platform: darwin/arm64
            os_name: darwin
            arch: arm64
            extra_args: ""

          - os: windows-latest
            platform: windows/amd64
            os_name: windows
            arch: amd64
            extra_args: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      # Derive version (strip leading "v") and archive name
      - name: Set artifact name
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ARCHIVE=kyp-gui_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}" >> "$GITHUB_ENV"

      # Linux: binary → tar.gz (matches goreleaser TUI format)
      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        working-directory: cmd/kyp-gui
        run: wails build -platform ${{ matrix.platform }} -o kyp-gui ${{ matrix.extra_args }}

      - name: Package Linux archive
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ env.ARCHIVE }}.tar.gz" \
            -C cmd/kyp-gui/build/bin kyp-gui \
            -C "$GITHUB_WORKSPACE" LICENSE README.md
          echo "ASSET=${{ env.ARCHIVE }}.tar.gz" >> "$GITHUB_ENV"

      # macOS: .app bundle → zip
      - name: Build (macOS)
        if: runner.os == 'macOS'
        working-directory: cmd/kyp-gui
        run: wails build -platform ${{ matrix.platform }}

      - name: Package macOS archive
        if: runner.os == 'macOS'
        run: |
          APP=$(find cmd/kyp-gui/build/bin -maxdepth 1 -name "*.app" | head -1)
          zip -r "${{ env.ARCHIVE }}.zip" "$APP"
          echo "ASSET=${{ env.ARCHIVE }}.zip" >> "$GITHUB_ENV"

      # Windows: .exe → zip (matches goreleaser TUI format)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: cmd/kyp-gui
        run: wails build -platform ${{ matrix.platform }} -o kyp-gui.exe ${{ matrix.extra_args }}

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a "${{ env.ARCHIVE }}.zip" \
            cmd/kyp-gui/build/bin/kyp-gui.exe \
            LICENSE README.md
          echo "ASSET=${{ env.ARCHIVE }}.zip" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

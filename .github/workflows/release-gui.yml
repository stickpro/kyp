name: Release GUI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            os_name: linux
            arch: amd64
            extra_args: "-tags webkit2_41"

          - os: macos-latest
            platform: darwin/arm64
            os_name: darwin
            arch: arm64
            extra_args: ""

          - os: windows-latest
            platform: windows/amd64
            os_name: windows
            arch: amd64
            extra_args: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      # Derive version (strip leading "v") and archive name
      - name: Set artifact name
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ARCHIVE=kyp-gui_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}" >> "$GITHUB_ENV"

      # Linux: binary → tar.gz (matches goreleaser TUI format)
      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        working-directory: cmd/kyp-gui
        run: wails build -platform ${{ matrix.platform }} -o kyp-gui ${{ matrix.extra_args }}

      - name: Package Linux archive
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ env.ARCHIVE }}.tar.gz" \
            -C cmd/kyp-gui/build/bin kyp-gui \
            -C "$GITHUB_WORKSPACE" LICENSE README.md \
            -C "$GITHUB_WORKSPACE/cmd/kyp-gui/build/linux" kyp-gui.desktop
          echo "ASSET=${{ env.ARCHIVE }}.tar.gz" >> "$GITHUB_ENV"

      # macOS: .app bundle → zip
      - name: Build (macOS)
        if: runner.os == 'macOS'
        working-directory: cmd/kyp-gui
        run: wails build -platform ${{ matrix.platform }}

      - name: Package macOS archive
        if: runner.os == 'macOS'
        run: |
          APP=$(find cmd/kyp-gui/build/bin -maxdepth 1 -name "*.app" | head -1)
          zip -r "${{ env.ARCHIVE }}.zip" "$APP"
          echo "ASSET=${{ env.ARCHIVE }}.zip" >> "$GITHUB_ENV"

      # Windows: .exe → zip (matches goreleaser TUI format)
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: cmd/kyp-gui
        run: wails build -platform ${{ matrix.platform }} -o kyp-gui.exe ${{ matrix.extra_args }}

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: bash
        run: |
          7z a "${{ env.ARCHIVE }}.zip" \
            cmd/kyp-gui/build/bin/kyp-gui.exe \
            LICENSE README.md
          echo "ASSET=${{ env.ARCHIVE }}.zip" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

      - name: Publish kyp-gui-bin to AUR
        if: runner.os == 'Linux'
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

          SHA256=$(sha256sum "${{ env.ASSET }}" | awk '{print $1}')
          PKGVER="${{ env.VERSION }}"

          git clone ssh://aur@aur.archlinux.org/kyp-gui-bin.git /tmp/kyp-gui-bin
          cat > /tmp/kyp-gui-bin/PKGBUILD <<EOF
          pkgname=kyp-gui-bin
          pkgver=${PKGVER}
          pkgrel=1
          pkgdesc="Keep Your Passwords — local-first GUI password manager"
          arch=('x86_64')
          url="https://github.com/stickpro/kyp"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3')
          provides=('kyp-gui')
          conflicts=('kyp-gui' 'kyp-gui-git')
          source=("kyp-gui_\${pkgver}_linux_amd64.tar.gz::https://github.com/stickpro/kyp/releases/download/v\${pkgver}/kyp-gui_\${pkgver}_linux_amd64.tar.gz")
          sha256sums=('${SHA256}')

          package() {
            install -Dm755 kyp-gui "\${pkgdir}/usr/bin/kyp-gui"
            install -Dm644 kyp-gui.desktop "\${pkgdir}/usr/share/applications/kyp-gui.desktop"
            install -Dm644 LICENSE "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
            install -Dm644 README.md "\${pkgdir}/usr/share/doc/\${pkgname}/README.md"
          }
          EOF

          cd /tmp/kyp-gui-bin
          git config user.name "goreleaser-bot"
          git config user.email "goreleaser@stickpro"
          makepkg --printsrcinfo > .SRCINFO
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${PKGVER}"
          git push

name: Update AUR source package

on:
  release:
    types: [published]

jobs:
  aur-update:
    name: Update kyp (AUR)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Sy --noconfirm git base-devel go openssh curl

      - name: Setup SSH
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org > /root/.ssh/known_hosts
          chmod 644 /root/.ssh/known_hosts
          cat > /root/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur
            UserKnownHostsFile /root/.ssh/known_hosts
          EOF
          chmod 600 /root/.ssh/config

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Calculate checksum
        id: checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=$(curl -sL "https://github.com/stickpro/kyp/archive/v${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/kyp.git /aur-kyp

      - name: Update PKGBUILD
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.checksum.outputs.sha256 }}
          cp packaging/aur/kyp/PKGBUILD /aur-kyp/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" /aur-kyp/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" /aur-kyp/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" /aur-kyp/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          useradd -m builder
          chown -R builder:builder /aur-kyp
          cd /aur-kyp && sudo -u builder makepkg --printsrcinfo > /tmp/SRCINFO
          cp /tmp/SRCINFO /aur-kyp/.SRCINFO
          chown -R root:root /aur-kyp

      - name: Push kyp to AUR
        run: |
          cd /aur-kyp
          git config user.name "goreleaser-bot"
          git config user.email "goreleaser@stickpro"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "update to ${{ steps.version.outputs.version }}"
          git push

      - name: Clone kyp-gui AUR repo
        run: git clone ssh://aur@aur.archlinux.org/kyp-gui.git /aur-kyp-gui

      - name: Update kyp-gui PKGBUILD
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.checksum.outputs.sha256 }}
          cp packaging/aur/kyp-gui/PKGBUILD /aur-kyp-gui/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" /aur-kyp-gui/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" /aur-kyp-gui/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" /aur-kyp-gui/PKGBUILD

      - name: Generate kyp-gui .SRCINFO
        run: |
          chown -R builder:builder /aur-kyp-gui
          cd /aur-kyp-gui && sudo -u builder makepkg --printsrcinfo > /tmp/SRCINFO_gui
          cp /tmp/SRCINFO_gui /aur-kyp-gui/.SRCINFO
          chown -R root:root /aur-kyp-gui

      - name: Push kyp-gui to AUR
        run: |
          cd /aur-kyp-gui
          git config user.name "goreleaser-bot"
          git config user.email "goreleaser@stickpro"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "update to ${{ steps.version.outputs.version }}"
          git push

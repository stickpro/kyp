version: 2

sql:
  # vault_meta
  - schema: sqlite/migrations
    queries: sqlite/queries/vault_meta
    engine: sqlite
    gen:
      go:
        sql_package: database/sql
        out: ../internal/storage/sqlite/repo_vault
        emit_prepared_queries: false
        emit_json_tags: true
        emit_exported_queries: false
        emit_db_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: false

  # entries
  - schema: sqlite/migrations
    queries: sqlite/queries/entries
    engine: sqlite
    gen:
      go:
        sql_package: database/sql
        out: ../internal/storage/sqlite/repo_entry
        emit_prepared_queries: false
        emit_json_tags: true
        emit_exported_queries: false
        emit_db_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: false

  # sync_state
  - schema: sqlite/migrations
    queries: sqlite/queries/sync_state
    engine: sqlite
    gen:
      go:
        sql_package: database/sql
        out: ../internal/storage/sqlite/repo_sync
        emit_prepared_queries: false
        emit_json_tags: true
        emit_exported_queries: false
        emit_db_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: false

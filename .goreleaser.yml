version: 2

project_name: kyp

before:
  hooks:
    - go mod download

builds:
  - id: kyp
    main: ./cmd/kyp
    binary: kyp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commitHash={{.Commit}}

  - id: kyp-import
    main: ./cmd/import
    binary: kyp-import
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: kyp-archive
    ids: [kyp, kyp-import]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Linux packages: .deb, .rpm, .apk
nfpms:
  - id: kyp-packages
    package_name: kyp
    ids: [kyp]
    vendor: stickpro
    homepage: https://github.com/stickpro/kyp
    maintainer: stickpro
    description: |-
      Keep Your Passwords — local-first terminal password manager.
      Encrypted SQLite vault, TOTP support, Bitwarden CSV import.
    license: MIT
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    section: utils
    contents:
      - src: LICENSE
        dst: /usr/share/doc/kyp/LICENSE
      - src: README.md
        dst: /usr/share/doc/kyp/README.md

# Homebrew tap  (requires repo: github.com/stickpro/homebrew-kyp)
homebrew_casks:
  - ids: [kyp-archive]
    name: kyp
    repository:
      owner: stickpro
      name: homebrew-kyp
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@stickpro
    homepage: https://github.com/stickpro/kyp
    description: Local-first terminal password manager with TOTP support
    license: MIT

# Windows Scoop manifest  (requires repo: github.com/stickpro/scoop-kyp)
scoops:
  - ids: [kyp-archive]
    repository:
      owner: stickpro
      name: scoop-kyp
      token: "{{ .Env.SCOOP_TAP_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@stickpro
    homepage: https://github.com/stickpro/kyp
    description: Local-first terminal password manager with TOTP support
    license: MIT

# AUR packages
aurs:
  # kyp-bin: pre-built binary from GitHub Releases
  - name: kyp-bin
    homepage: https://github.com/stickpro/kyp
    description: Local-first terminal password manager with TOTP support (binary release)
    license: MIT
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/kyp-bin.git
    provides: [kyp]
    conflicts: [kyp, kyp-git]
    depends: [xclip]
    commit_author:
      name: goreleaser-bot
      email: goreleaser@stickpro
    package: |-
      install -Dm755 kyp "${pkgdir}/usr/bin/kyp"
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
      install -Dm644 README.md "${pkgdir}/usr/share/doc/${pkgname}/README.md"

  # kyp: build from source
  - name: kyp
    homepage: https://github.com/stickpro/kyp
    description: Local-first terminal password manager with TOTP support
    license: MIT
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/kyp.git
    provides: [kyp]
    conflicts: [kyp-bin, kyp-git]
    depends: [xclip, go]
    commit_author:
      name: goreleaser-bot
      email: goreleaser@stickpro
    url_template: "https://github.com/stickpro/kyp/archive/v{{ .Version }}.tar.gz"
    package: |-
      cd "${srcdir}/kyp-{{ .Version }}"
      go build -ldflags "-s -w -X main.version={{ .Version }}" -o kyp ./cmd/kyp
      install -Dm755 kyp "${pkgdir}/usr/bin/kyp"
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
      install -Dm644 README.md "${pkgdir}/usr/share/doc/${pkgname}/README.md"

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Security"
      regexp: "^sec"
      order: 2
    - title: "Performance"
      regexp: "^perf"
      order: 3
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: stickpro
    name: kyp
  name_template: "{{.ProjectName}} {{.Tag}}"
